# Project-wide Gradle settings

# JVM memory settings for Gradle
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# IMPORTANT: Let Android Studio manage Java automatically
# Do NOT set org.gradle.java.home manually

# AndroidX support
android.useAndroidX=true

# Kotlin style
kotlin.code.style=official

# Improves build performance and avoids cross-library R issues
android.nonTransitiveRClass=true